name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go test -cover ./...

  frontend:
    name: Frontend (uni-app / Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniprogram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: miniprogram/package-lock.json
      - run: npm ci
      - run: npx vue-tsc --noEmit
      - run: npx vitest run

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pet-applet-backend backend/
